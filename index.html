          class="absolute top-[55%] right-[11%] w-12 h-7 bg-[#F49EB2] rounded-full opacity-60"

        <div
          class="absolute top-[58%] left-1/2 -translate-x-1/2 w-[98px] h-[72px] bg-[#F48FB1] border-[4px] border-black rounded-[45%] flex items-center justify-center gap-4"
